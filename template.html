<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Sentinela</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; padding: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; border-top: 5px solid #94a3b8; }
        .online { border-top-color: #22c55e; }
        .offline { border-top-color: #ef4444; }
        h3 { margin-top: 0; }
        .status { font-weight: bold; text-transform: uppercase; font-size: 0.8em; }
    </style>
</head>
<body>
    <h1>🛰️ Health Monitor Dashboard</h1>
    <div class="grid" id="dashboard">
        </div>
    <p style="margin-top: 20px; color: #94a3b8;">Última atualização: </p>
</body>
</html>
